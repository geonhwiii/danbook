<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네트워크 인터랙티브 학습 — 웹 개발자를 위한 네트워크</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        /* surfaces */
        --canvas-soft: #f6f5f4;
        --surface: #ffffff;
        --hairline: #e6e6e6;
        --hairline-strong: #dddbd7;
        /* ink */
        --ink: #1c1b19;
        --ink-secondary: #31302e;
        --ink-muted: #615d59;
        --ink-faint: #a39e98;
        /* brand + accent */
        --primary: #0075de;
        --primary-active: #005bab;
        --secondary: #213183;
        --green: #1aae39;
        --orange: #dd5b00;
        --orange-deep: #793400;
        --purple: #391c57;
        --teal: #2a9d99;
        --sky: #62aef0;
        --pink: #ff64c8;
        --coral: #dd5b00;
        /* type */
        --body: 'Inter', -apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif;
        --disp: 'Inter', -apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif;
        --mono: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;
        /* radius */
        --r-xs: 4px;
        --r-sm: 5px;
        --r-md: 8px;
        --r-lg: 12px;
        --r-xl: 16px;
        --r-full: 9999px;
        /* legacy aliases kept so inline refs resolve */
        --r: 12px;
        --shadow-1:
          rgba(0, 0, 0, 0.01) 0 0.175px 1.041px, rgba(0, 0, 0, 0.02) 0 0.8px 2.925px,
          rgba(0, 0, 0, 0.027) 0 2.025px 7.847px, rgba(0, 0, 0, 0.04) 0 4px 18px;
        --sidebar-w: 288px;
      }
      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        background: var(--canvas-soft);
        color: var(--ink-secondary);
        font-family: var(--body);
        font-size: 16px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        font-feature-settings: 'lnum' 1;
      }
      ::selection {
        background: rgba(0, 117, 222, 0.16);
      }
      a {
        color: var(--primary);
      }

      /* ---------- Layout ---------- */
      .app {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: var(--sidebar-w);
        flex: 0 0 var(--sidebar-w);
        border-right: 1px solid var(--hairline);
        background: var(--surface);
        position: sticky;
        top: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        z-index: 20;
      }
      .brand {
        margin: 16px 16px 14px;
        padding: 20px 20px 18px;
        border-radius: var(--r-lg);
        background:
          radial-gradient(circle at 84% 26%, rgba(98, 174, 240, 0.45) 0 1.4px, transparent 2px),
          radial-gradient(circle at 70% 64%, rgba(255, 100, 200, 0.4) 0 1.2px, transparent 2px),
          radial-gradient(circle at 90% 76%, rgba(214, 182, 246, 0.5) 0 1.4px, transparent 2px), var(--secondary);
        color: #fff;
        position: relative;
        overflow: hidden;
      }
      .brand .kicker {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.66);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .brand .kicker .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
        animation: pulse 2.6s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      .brand h1 {
        font-family: var(--disp);
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.4px;
        margin: 12px 0 3px;
        line-height: 1.18;
      }
      .brand p {
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.62);
        margin: 0;
      }

      .nav {
        flex: 1;
        overflow-y: auto;
        padding: 4px 12px 12px;
      }
      .nav-item {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        width: 100%;
        text-align: left;
        position: relative;
        background: none;
        border: 1px solid transparent;
        color: var(--ink-muted);
        padding: 11px 12px;
        border-radius: var(--r-md);
        cursor: pointer;
        font-family: var(--body);
        font-size: 14px;
        margin-bottom: 2px;
        transition: 0.15s;
        line-height: 1.35;
      }
      .nav-item:hover {
        background: var(--canvas-soft);
        color: var(--ink);
      }
      .nav-item.active {
        background: var(--canvas-soft);
        color: var(--ink);
      }
      .nav-item.active::before {
        content: '';
        position: absolute;
        left: -1px;
        top: 9px;
        bottom: 9px;
        width: 3px;
        border-radius: 99px;
        background: var(--primary);
      }
      .nav-item .num {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink-faint);
        font-weight: 500;
        flex: 0 0 auto;
        width: 18px;
      }
      .nav-item.active .num {
        color: var(--primary);
      }
      .nav-item .meta {
        flex: 1;
        min-width: 0;
      }
      .nav-item .t {
        font-weight: 600;
        display: block;
        letter-spacing: -0.1px;
      }
      .nav-item .s {
        font-size: 11px;
        color: var(--ink-faint);
        font-family: var(--mono);
      }
      .nav-item .check {
        flex: 0 0 auto;
        width: 17px;
        height: 17px;
        border-radius: 50%;
        border: 1.5px solid var(--hairline-strong);
        margin-top: 2px;
        display: grid;
        place-items: center;
        font-size: 10px;
        color: transparent;
        transition: 0.2s;
      }
      .nav-item.done .check {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }

      .progress-wrap {
        padding: 14px 22px;
        border-top: 1px solid var(--hairline);
      }
      .progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        font-family: var(--mono);
        color: var(--ink-faint);
        margin-bottom: 7px;
      }
      .progress-track {
        height: 6px;
        background: var(--canvas-soft);
        border: 1px solid var(--hairline);
        border-radius: 99px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        width: 0;
        background: var(--primary);
        border-radius: 99px;
        transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .reset-btn {
        margin-top: 10px;
        width: 100%;
        font-family: var(--mono);
        font-size: 11px;
        background: none;
        border: 1px solid var(--hairline);
        color: var(--ink-faint);
        padding: 7px;
        border-radius: var(--r-md);
        cursor: pointer;
        transition: 0.15s;
      }
      .reset-btn:hover {
        color: var(--orange);
        border-color: var(--orange);
      }

      /* ---------- Main ---------- */
      .main {
        flex: 1;
        min-width: 0;
      }
      .content {
        max-width: 820px;
        margin: 0 auto;
        padding: 56px 40px 120px;
      }

      .lesson-head {
        margin-bottom: 36px;
        border-bottom: 1px solid var(--hairline);
        padding-bottom: 26px;
      }
      .lesson-head .eyebrow {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .lesson-head .eyebrow .barcode {
        display: inline-flex;
        gap: 2px;
        align-items: center;
      }
      .lesson-head .eyebrow .barcode i {
        display: block;
        width: 2px;
        background: #c9c5c0;
      }
      .lesson-head h2 {
        font-family: var(--disp);
        font-size: 40px;
        font-weight: 700;
        margin: 0 0 6px;
        letter-spacing: -1px;
        line-height: 1.1;
        color: var(--ink);
      }
      .lesson-head .sub {
        font-family: var(--mono);
        color: var(--ink-faint);
        font-size: 14px;
        margin-bottom: 18px;
      }
      .lesson-head .lede {
        color: var(--ink-secondary);
        font-size: 17px;
        max-width: 62ch;
        margin: 0;
        line-height: 1.55;
      }

      section.card {
        margin-bottom: 18px;
        scroll-margin-top: 24px;
      }
      .concept {
        background: var(--surface);
        border: 1px solid var(--hairline);
        border-radius: var(--r-lg);
        padding: 26px 28px;
      }
      .concept h3 {
        font-family: var(--disp);
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.25px;
        margin: 0 0 10px;
        display: flex;
        align-items: center;
        gap: 11px;
        color: var(--ink);
      }
      .concept h3 .ix {
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--primary);
        background: var(--surface);
        border: 1px solid var(--hairline);
        padding: 3px 9px;
        border-radius: var(--r-full);
        letter-spacing: 0;
      }
      .concept p {
        margin: 12px 0;
        color: var(--ink-secondary);
        font-size: 16px;
        line-height: 1.6;
      }
      .concept p:first-of-type {
        margin-top: 6px;
      }
      .concept strong {
        color: var(--ink);
        font-weight: 600;
      }
      .concept .hl {
        color: var(--ink);
        font-weight: 500;
        background: rgba(98, 174, 240, 0.2);
        padding: 0 4px;
        border-radius: 4px;
      }
      .concept .hl-amber {
        color: var(--orange-deep);
        font-weight: 500;
        background: rgba(221, 91, 0, 0.13);
        padding: 0 4px;
        border-radius: 4px;
      }
      .concept ul {
        margin: 12px 0;
        padding-left: 2px;
        list-style: none;
      }
      .concept li {
        color: var(--ink-secondary);
        font-size: 16px;
        margin: 9px 0;
        padding-left: 22px;
        position: relative;
        line-height: 1.55;
      }
      .concept li::before {
        content: '▸';
        position: absolute;
        left: 2px;
        color: var(--ink-faint);
        font-size: 12px;
        top: 2px;
      }
      code {
        font-family: var(--mono);
        font-size: 0.86em;
        background: #f1efed;
        padding: 2px 6px;
        border-radius: var(--r-xs);
        color: var(--ink);
        border: 1px solid var(--hairline);
        white-space: nowrap;
      }
      .term {
        font-family: var(--mono);
        background: var(--canvas-soft);
        border: 1px solid var(--hairline);
        border-radius: var(--r-md);
        padding: 14px 16px;
        margin: 16px 0;
        font-size: 13px;
        color: var(--ink-secondary);
        overflow-x: auto;
        line-height: 1.7;
      }
      .term .pr {
        color: var(--primary);
        font-weight: 600;
      }
      .term .cm {
        color: var(--ink-faint);
        font-style: italic;
      }
      .callout {
        background: var(--canvas-soft);
        border: 1px solid var(--hairline);
        border-left: 3px solid var(--orange);
        border-radius: 0 var(--r-md) var(--r-md) 0;
        padding: 13px 16px;
        margin: 16px 0;
        font-size: 14.5px;
        color: var(--ink-secondary);
        line-height: 1.55;
      }
      .callout b {
        color: var(--orange-deep);
      }

      /* ---------- Quiz ---------- */
      .quiz {
        background: var(--surface);
        border: 1px solid var(--hairline);
        border-radius: var(--r-lg);
        padding: 24px 26px;
      }
      .quiz .qtag {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .quiz .qtag::before {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--purple);
        flex: 0 0 auto;
      }
      .quiz .qtag .multi {
        background: rgba(57, 28, 87, 0.1);
        color: var(--purple);
        padding: 2px 8px;
        border-radius: var(--r-full);
        font-size: 10px;
        letter-spacing: 0.04em;
      }
      .quiz .q {
        font-size: 17px;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 16px;
        line-height: 1.5;
        letter-spacing: -0.2px;
      }
      .opt {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        width: 100%;
        text-align: left;
        background: var(--surface);
        border: 1px solid var(--hairline);
        color: var(--ink-secondary);
        padding: 13px 15px;
        border-radius: var(--r-md);
        cursor: pointer;
        font-family: var(--body);
        font-size: 15px;
        margin-bottom: 8px;
        transition: 0.14s;
        line-height: 1.4;
      }
      .opt:hover:not(:disabled) {
        border-color: var(--primary);
        color: var(--ink);
      }
      .opt:disabled {
        cursor: default;
      }
      .opt .mk {
        flex: 0 0 auto;
        width: 20px;
        height: 20px;
        border-radius: var(--r-sm);
        border: 1.5px solid var(--hairline-strong);
        display: grid;
        place-items: center;
        font-size: 11px;
        color: transparent;
        margin-top: 1px;
        transition: 0.15s;
      }
      .opt.sel {
        border-color: var(--primary);
        background: rgba(0, 117, 222, 0.05);
      }
      .opt.sel .mk {
        border-color: var(--primary);
        background: var(--primary);
      }
      .opt.correct {
        border-color: var(--green);
        background: rgba(26, 174, 57, 0.09);
        color: var(--ink);
      }
      .opt.correct .mk {
        border-color: var(--green);
        background: var(--green);
        color: #fff;
      }
      .opt.correct .mk::after {
        content: '✓';
      }
      .opt.wrong {
        border-color: var(--orange);
        background: rgba(221, 91, 0, 0.08);
        color: var(--ink);
      }
      .opt.wrong .mk {
        border-color: var(--orange);
        background: var(--orange);
        color: #fff;
      }
      .opt.wrong .mk::after {
        content: '✕';
      }
      .opt.miss {
        border-color: var(--green);
        border-style: dashed;
      }
      .quiz-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 8px;
      }
      .btn {
        font-family: var(--body);
        font-size: 15px;
        font-weight: 500;
        padding: 9px 20px;
        border-radius: var(--r-full);
        cursor: pointer;
        border: 1px solid var(--primary);
        background: var(--primary);
        color: #fff;
        transition: 0.14s;
      }
      .btn:hover {
        background: var(--primary-active);
        border-color: var(--primary-active);
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .btn.ghost {
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--hairline);
        border-radius: var(--r-md);
        box-shadow: var(--shadow-1);
      }
      .btn.ghost:hover {
        background: var(--surface);
        border-color: var(--primary);
        color: var(--primary);
      }
      .explain {
        margin-top: 14px;
        padding: 14px 16px;
        background: var(--canvas-soft);
        border: 1px solid var(--hairline);
        border-left: 3px solid var(--primary);
        border-radius: 0 var(--r-md) var(--r-md) 0;
        font-size: 14.5px;
        color: var(--ink-secondary);
        display: none;
        line-height: 1.55;
      }
      .explain.show {
        display: block;
        animation: fade 0.3s ease;
      }
      .explain b {
        color: var(--ink);
      }
      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ---------- Widget shell ---------- */
      .widget {
        background: var(--surface);
        border: 1px solid var(--hairline);
        border-radius: var(--r-lg);
        padding: 24px 26px;
        box-shadow: var(--shadow-1);
      }
      .widget .wtag {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .widget .wtag::before {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--teal);
        flex: 0 0 auto;
      }
      .widget .wtitle {
        font-family: var(--disp);
        font-size: 21px;
        font-weight: 700;
        letter-spacing: -0.3px;
        margin: 0 0 5px;
        color: var(--ink);
      }
      .widget .wdesc {
        color: var(--ink-muted);
        font-size: 14.5px;
        margin: 0 0 20px;
        line-height: 1.5;
      }
      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 16px;
      }
      .stepbtn {
        font-family: var(--body);
        font-size: 14px;
        font-weight: 500;
        background: var(--surface);
        border: 1px solid var(--hairline);
        color: var(--ink);
        padding: 8px 16px;
        border-radius: var(--r-md);
        cursor: pointer;
        transition: 0.15s;
        box-shadow: var(--shadow-1);
      }
      .stepbtn:hover {
        border-color: var(--primary);
        color: var(--primary);
      }
      .stepbtn:disabled {
        opacity: 0.4;
        cursor: default;
        box-shadow: none;
      }

      /* Layer stack */
      .layer {
        display: flex;
        align-items: center;
        gap: 0;
        border: 1px solid var(--hairline);
        border-radius: var(--r-md);
        margin-bottom: 8px;
        cursor: pointer;
        overflow: hidden;
        transition: 0.18s;
        background: var(--surface);
      }
      .layer:hover {
        border-color: var(--primary);
      }
      .layer.active {
        border-color: var(--primary);
        box-shadow: 0 0 0 1px var(--primary);
        background: rgba(0, 117, 222, 0.04);
      }
      .layer .ln {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-muted);
        width: 36px;
        text-align: center;
        flex: 0 0 auto;
        padding: 15px 0;
        background: var(--canvas-soft);
        align-self: stretch;
        display: grid;
        place-items: center;
      }
      .layer .lbody {
        padding: 13px 16px;
        flex: 1;
      }
      .layer .lname {
        font-family: var(--disp);
        font-weight: 700;
        font-size: 15px;
        letter-spacing: -0.2px;
        color: var(--ink);
      }
      .layer .lprot {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink-muted);
        margin-top: 2px;
      }
      .layer.active .lprot {
        color: var(--primary);
      }
      .layer.waist .lbody {
        background: rgba(0, 117, 222, 0.05);
      }
      .layer-detail {
        margin-top: 16px;
        padding: 16px 18px;
        background: var(--canvas-soft);
        border-radius: var(--r-md);
        border: 1px solid var(--hairline);
        font-size: 14.5px;
        color: var(--ink-secondary);
        min-height: 80px;
        line-height: 1.55;
      }
      .layer-detail h4 {
        font-family: var(--disp);
        margin: 0 0 8px;
        font-size: 15px;
        color: var(--ink);
        letter-spacing: -0.2px;
      }
      .layer-detail .tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .layer-detail .tag {
        font-family: var(--mono);
        font-size: 11px;
        background: var(--surface);
        border: 1px solid var(--hairline);
        padding: 3px 9px;
        border-radius: var(--r-full);
        color: var(--ink-muted);
      }

      /* Binary octet */
      .octet-display {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin: 18px 0;
        flex-wrap: wrap;
      }
      .bit {
        width: 46px;
        text-align: center;
        user-select: none;
      }
      .bit .bval {
        font-family: var(--mono);
        font-size: 24px;
        font-weight: 700;
        padding: 8px 0;
        border-radius: var(--r-md);
        cursor: pointer;
        transition: 0.15s;
        border: 1px solid var(--hairline);
        background: var(--surface);
        color: var(--ink);
      }
      .bit.on .bval {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .bit .pw {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--ink-faint);
        margin-top: 5px;
      }
      .octet-out {
        text-align: center;
        font-family: var(--mono);
        margin-top: 8px;
      }

      /* =========================================================================
   진행 상태 저장 — localStorage 사용, 실패 시 메모리 폴백 (file:// 대비)
   ========================================================================= */
      const Store = (() => {
        let mem = {};
        let ok = true;
        try {
          const k = '__nx_test__';
          localStorage.setItem(k, '1');
          localStorage.removeItem(k);
        } catch (e) {
          ok = false;
        }
        const KEY = 'network-study-progress-v1';
        function read() {
          if (!ok) return mem;
          try {
            return JSON.parse(localStorage.getItem(KEY) || '{}');
          } catch (e) {
            return {};
          }
        }
        function write(o) {
          if (!ok) {
            mem = o;
            return;
          }
          try {
            localStorage.setItem(KEY, JSON.stringify(o));
          } catch (e) {
            mem = o;
          }
        }
        return {
          get: (k, d) => {
            const o = read();
            return k in o ? o[k] : d;
          },
          set: (k, v) => {
            const o = read();
            o[k] = v;
            write(o);
          },
          clear: () => {
            if (ok) {
              try {
                localStorage.removeItem(KEY);
              } catch (e) {}
            }
            mem = {};
          },
        };
      })();

<span class="cm">3 packets transmitted, 3 received, 0% packet loss</span></div>

            out.textContent = fmtBits(b) + ' in flight';
          };
          bw.addEventListener('input', update);
          lat.addEventListener('input', update);
          update();
        },
      };

      /* =========================================================================
   렌더링 & 상태
   ========================================================================= */
      const content = document.getElementById('content');
      const nav = document.getElementById('nav');
      let currentLesson = Store.get('lastLesson', 0);

      function quizDone(qid) {
        return Store.get('quiz:' + qid, false);
      }
      function allQuizIds(lesson) {
        return lesson.sections.filter((s) => s.type === 'quiz').map((s) => s.id);
      }
      function lessonDone(lesson) {
        const ids = allQuizIds(lesson);
        return ids.length > 0 && ids.every(quizDone);
      }

      function renderNav() {
        nav.innerHTML = '';
        COURSE.forEach((L, i) => {
          const b = document.createElement('button');
          b.className = 'nav-item' + (i === currentLesson ? ' active' : '') + (lessonDone(L) ? ' done' : '');
          b.innerHTML = `<span class="num">${L.num}</span><span class="meta"><span class="t">${L.title}</span><span class="s">${L.sub}</span></span><span class="check">✓</span>`;
          b.addEventListener('click', () => {
            goLesson(i);
            closeSidebar();
          });
          nav.appendChild(b);
        });
        updateProgress();
      }

      function updateProgress() {
        let total = 0,
          done = 0;
        COURSE.forEach((L) =>
          allQuizIds(L).forEach((id) => {
            total++;
            if (quizDone(id)) done++;
          }),
        );
        const pct = total ? Math.round((done / total) * 100) : 0;
        document.getElementById('progFill').style.width = pct + '%';
        document.getElementById('progPct').textContent = pct + '%';
      }

      function renderLesson(i) {
        const L = COURSE[i];
        const bars = Array.from(
          { length: 9 },
          (_, k) => `<i style="height:${[7, 14, 9, 16, 5, 12, 8, 15, 6][k]}px"></i>`,
        ).join('');
        let html = `
    <div class="lesson-head">
      <div class="eyebrow"><span class="barcode">${bars}</span> LESSON ${L.num}</div>
      <h2>${L.title}</h2>
      <div class="sub">${L.sub}</div>
      <p class="lede">${L.lede}</p>
    </div>`;
        L.sections.forEach((s, idx) => {
          if (s.type === 'concept') {
            html += `<section class="card"><div class="concept"><h3><span class="ix">${s.ix}</span>${s.title}</h3>${s.html}</div></section>`;
          } else if (s.type === 'widget') {
            html += `<section class="card"><div class="widget" data-widget="${s.id}" id="w-${i}-${idx}"></div></section>`;
          } else if (s.type === 'quiz') {
            html += renderQuiz(s);
          }
        });
        const prev =
          i > 0 ? `<button class="next-btn" data-go="${i - 1}">◂ ${COURSE[i - 1].title}</button>` : '<span></span>';
        const nextL =
          i < COURSE.length - 1
            ? `<button class="next-btn" data-go="${i + 1}">${COURSE[i + 1].title} ▸</button>`
            : '<span style="color:var(--green)">🎉 마지막 강의입니다</span>';
        html += `<div class="footer-note">${prev}${nextL}</div>`;
        content.innerHTML = html;

        L.sections.forEach((s, idx) => {
          if (s.type === 'widget') {
            const hostEl = document.getElementById(`w-${i}-${idx}`);
            const W = WIDGETS[s.id];
            hostEl.innerHTML = W.render();
            W.init(hostEl);
          }
        });
        content.querySelectorAll('[data-quiz]').forEach(initQuiz);
        content
          .querySelectorAll('[data-go]')
          .forEach((b) => b.addEventListener('click', () => goLesson(+b.dataset.go)));
        window.scrollTo({ top: 0 });
      }

      function renderQuiz(s) {
        return `<section class="card"><div class="quiz" data-quiz="${s.id}" data-multi="${s.multi}" data-correct="${s.correct.join(',')}">
    <div class="qtag">QUIZ ${s.multi ? '<span class="multi">복수 선택</span>' : ''}</div>
    <div class="q">${s.q}</div>
    <div class="opts">${s.opts.map((o, i) => `<button class="opt" data-i="${i}"><span class="mk"></span><span>${o}</span></button>`).join('')}</div>
    <div class="quiz-actions">
      <button class="btn" data-act="check">정답 확인</button>
      <button class="btn ghost" data-act="retry" style="display:none">다시 풀기</button>
    </div>
    <div class="explain">${s.explain}</div>
  </div></section>`;
      }

      function initQuiz(box) {
        const qid = box.dataset.quiz;
        const multi = box.dataset.multi === 'true';
        const correct = box.dataset.correct.split(',').map(Number);
        const opts = [...box.querySelectorAll('.opt')];
        const checkBtn = box.querySelector('[data-act="check"]');
        const retryBtn = box.querySelector('[data-act="retry"]');
        const explain = box.querySelector('.explain');
        let sel = new Set();
        let locked = false;

        opts.forEach((o) => {
          o.addEventListener('click', () => {
            if (locked) return;
            const i = +o.dataset.i;
            if (multi) {
              if (sel.has(i)) {
                sel.delete(i);
                o.classList.remove('sel');
              } else {
                sel.add(i);
                o.classList.add('sel');
              }
            } else {
              sel.clear();
              opts.forEach((x) => x.classList.remove('sel'));
              sel.add(i);
              o.classList.add('sel');
            }
          });
        });

        function grade() {
          if (sel.size === 0) return;
          locked = true;
          opts.forEach((o) => {
            const i = +o.dataset.i;
            o.disabled = true;
            const isCorrect = correct.includes(i);
            const chosen = sel.has(i);
            o.classList.remove('sel');
            if (chosen && isCorrect) o.classList.add('correct');
            else if (chosen && !isCorrect) o.classList.add('wrong');
            else if (!chosen && isCorrect) o.classList.add('miss');
          });
          explain.classList.add('show');
          checkBtn.style.display = 'none';
          retryBtn.style.display = 'inline-block';
          const okSet = sel.size === correct.length && [...sel].every((i) => correct.includes(i));
          if (okSet) {
            Store.set('quiz:' + qid, true);
            renderNav();
          }
        }
        function retry() {
          locked = false;
          sel.clear();
          opts.forEach((o) => {
            o.disabled = false;
            o.classList.remove('correct', 'wrong', 'miss', 'sel');
          });
          explain.classList.remove('show');
          checkBtn.style.display = 'inline-block';
          retryBtn.style.display = 'none';
        }
        checkBtn.addEventListener('click', grade);
        retryBtn.addEventListener('click', retry);
      }

      function goLesson(i) {
        currentLesson = i;
        Store.set('lastLesson', i);
        renderNav();
        renderLesson(i);
      }

      const sidebar = document.getElementById('sidebar');
      const scrim = document.getElementById('scrim');
      function closeSidebar() {
        sidebar.classList.remove('open');
        scrim.classList.remove('show');
      }
      document.getElementById('menuToggle').addEventListener('click', () => {
        sidebar.classList.toggle('open');
        scrim.classList.toggle('show');
      });
      scrim.addEventListener('click', closeSidebar);

      document.getElementById('resetBtn').addEventListener('click', () => {
        if (confirm('모든 학습 진행 기록을 초기화할까요?')) {
          Store.clear();
          renderNav();
          renderLesson(currentLesson);
        }
      });

      renderNav();
      renderLesson(currentLesson);
    </script>
  </body>
</html>
